services:
  app:
    build: .
    container_name: attendance-frontend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3011"
    networks:
      - app-network
    ports: [] # no host port needed, nginx handles it

networks:
  app-network:
    external: true
    name: amp_portal_backend_app-network
